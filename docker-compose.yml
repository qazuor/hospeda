services:
    postgres:
        image: postgres:15-alpine
        container_name: ${COMPOSE_PROJECT_NAME:-hospeda}-postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-hospeda_dev}
            POSTGRES_USER: ${POSTGRES_USER:-hospeda_user}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hospeda_pass}
            PGDATA: /var/lib/postgresql/data/pgdata
        ports:
            - '${POSTGRES_PORT:-5436}:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
        networks:
            - app-network
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-hospeda_user} -d ${POSTGRES_DB:-hospeda_dev}']
            interval: 10s
            timeout: 5s
            retries: 5

    pgadmin:
        image: dpage/pgadmin4:latest
        container_name: ${COMPOSE_PROJECT_NAME:-hospeda}-pgadmin
        restart: unless-stopped
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
            PGADMIN_CONFIG_SERVER_MODE: 'False'
        ports:
            - '${PGADMIN_PORT:-8081}:80'
        volumes:
            - pgadmin_data:/var/lib/pgadmin
            - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
        networks:
            - app-network
        depends_on:
            postgres:
                condition: service_healthy

    redis:
        image: redis:7-alpine
        container_name: ${COMPOSE_PROJECT_NAME:-hospeda}-redis
        restart: unless-stopped
        command: redis-server --appendonly yes
        ports:
            - '${REDIS_PORT:-6381}:6379'
        volumes:
            - redis_data:/data
        networks:
            - app-network
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 3s
            retries: 5

volumes:
    postgres_data:
        name: ${COMPOSE_PROJECT_NAME:-hospeda}-postgres-data
    pgadmin_data:
        name: ${COMPOSE_PROJECT_NAME:-hospeda}-pgadmin-data
    redis_data:
        name: ${COMPOSE_PROJECT_NAME:-hospeda}-redis-data

networks:
    app-network:
        name: ${COMPOSE_PROJECT_NAME:-hospeda}-network
        driver: bridge
