  "msw>path-to-regexp": "8.4.2"
  rollup: ">=4.59.0"
  qs: ">=6.14.2"
  "@isaacs/brace-expansion": ">=5.0.1"
  mdast-util-to-hast: ">=13.2.1"
  preact: ">=10.26.10"
  h3: ">=1.15.6"
  "nitro>h3": "2.0.1-rc.22"
  minimatch: ">=9.0.7"
  lodash: ">=4.17.24"
  lodash-es: ">=4.17.24"
  serialize-javascript: ">=7.0.3"
  prismjs: ">=1.30.0"
  "js-yaml@<4.1.1": "^4.1.1"
  undici: ">=7.28.0 <8"
  "vite@^6.0.0": ">=8.0.16 <9"
  "vite@^7.0.0": ">=8.0.16 <9"
  "vite@>=6.0.0": ">=8.0.16 <9"
  "@sentry/vite-plugin": ">=5.3.0"
  markdown-it: ">=14.1.1"
  diff: ">=8.0.3"
  defu: ">=6.1.5"
  flatted: ">=3.4.2"
  picomatch: ">=2.3.2"
  "picomatch@^4.0.0": ">=4.0.4"
  kysely: ">=0.28.17"
  svgo: ">=4.0.1"
