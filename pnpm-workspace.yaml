  drizzle-orm: ">=0.45.2"
  "@opentelemetry/api": "1.9.1"
  "@remix-run/node": ">=2.17.2"
  "@remix-run/router": ">=1.23.2"
  "@remix-run/server-runtime": ">=2.17.5"
  esbuild: ">=0.28.1"
  "@tanstack/form-core": "0.42.1"
  csstype: "3.1.3"
  "@types/react": "19.2.17"
  "@types/react-dom": "19.2.3"
  "@vitejs/plugin-react": "^6.0.3"
  turbo-stream: ">=3.0.0"

auditConfig:
  ignoreGhsas:
    - GHSA-rmmr-r34h-pfm5
    - GHSA-5xrq-8626-4rwp

allowBuilds:
  # Needed to upload source maps to Sentry from @sentry/esbuild-plugin (api)
  # and @sentry/vite-plugin (web, admin) at build time.
  '@sentry/cli': true
  # Native CPU profiler; hospeda-api depends on @sentry/profiling-node
  # directly (dependencies, not transitive) for Sentry performance profiling.
  '@sentry/node-cpu-profiler': true
  # Pulled in by posthog-js. Its postinstall only prints an OpenCollective
  # donation message — no build/codegen step is required for it to work.
  core-js: false
  # Downloads the platform-specific esbuild binary; required transitively by
  # astro, tsup and drizzle-kit builds across every app.
  esbuild: true
  # Native accelerator for msgpackr, used by bullmq (job queues backing the
  # billing crons: dunning, webhook-retry, etc. — see apps/api/src/cron/jobs).
  msgpackr-extract: true
  # Repo only uses msw/node's setupServer for test mocking (no setupWorker /
  # msw/browser usage found) — the postinstall only writes a browser service
  # worker file that nothing here consumes.
  msw: false
  # Direct dependency of hospeda-web (image optimization) and a root
  # devDependency; needs its native libvips binary to function.
  sharp: true

# pnpm >=10 changed `pnpm deploy` to require inject-workspace-packages=true.
# The web and api Dockerfiles use `pnpm deploy --filter=X --prod` in their prune
# stage; keep the pre-v10 deploy behavior instead of switching the whole
# workspace to injected packages (which would change @repo/* resolution in dev too).
forceLegacyDeploy: true

minimumReleaseAgeExclude:
  - '@qazuor/qzpay-core@1.15.0'
  - '@qazuor/qzpay-mercadopago@2.6.0'
