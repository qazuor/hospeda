server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for text-based assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Long-cache fingerprinted Astro assets.
    location /_astro/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Hashed images bucket (Astro emits to /_astro for assets too, but
    # any other public asset gets sane caching).
    location ~* \.(?:webp|jpg|jpeg|png|svg|ico|woff2?)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # Trailing-slash routing — Astro builds with trailingSlash: 'always'.
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Disallow indexing of internal artifacts only. Robots policy at root
    # is open by default (landing is meant to be indexed).
    location = /robots.txt {
        access_log off;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Custom 404 falls back to index.html so unknown routes still render
    # the coming-soon page instead of an ugly nginx error.
    error_page 404 = /index.html;
}
