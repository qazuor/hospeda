<svg xmlns="http://www.w3.org/2000/svg" width="150" height="80" viewBox="0 0 150 80" fill="none">
  <!-- Flecha curva decorativa -->
  <path 
    d="M10,60 Q40,70 70,50 T130,30" 
    stroke="#2D5A45" 
    stroke-width="3" 
    stroke-linecap="round"
    stroke-dasharray="8 4"
    fill="none"
  />
  <!-- Punta de flecha -->
  <path 
    d="M125,20 L135,30 L125,40" 
    stroke="#2D5A45" 
    stroke-width="3" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Punto de inicio -->
  <circle cx="10" cy="60" r="5" fill="#2D5A45"/>
</svg>
