<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400" fill="none">
  <defs>
    <linearGradient id="riverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="currentColor" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <!-- Representación estilizada del Río Uruguay con sus curvas características -->
  <path 
    d="M95,0 
       Q85,30 90,60 
       Q100,100 85,140
       Q70,180 80,220
       Q95,260 75,300
       Q60,340 70,380
       Q80,400 75,420"
    stroke="url(#riverGrad)"
    stroke-width="24"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Costa entrerriana (oeste) - línea punteada -->
  <path 
    d="M70,0 
       Q60,35 65,70 
       Q75,110 60,150
       Q45,190 55,230
       Q70,270 50,310
       Q35,350 45,390"
    stroke="currentColor"
    stroke-width="1.5"
    stroke-dasharray="8 6"
    stroke-linecap="round"
    fill="none"
    opacity="0.12"
  />
  <!-- Puntos de ciudades sobre la costa -->
  <circle cx="65" cy="80" r="4" fill="currentColor" opacity="0.2"/>
  <circle cx="52" cy="160" r="4" fill="currentColor" opacity="0.2"/>
  <circle cx="58" cy="240" r="4" fill="currentColor" opacity="0.2"/>
  <circle cx="42" cy="320" r="4" fill="currentColor" opacity="0.2"/>
</svg>
