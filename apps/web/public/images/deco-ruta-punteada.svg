<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none">
  <!-- Línea de ruta estilizada con marcadores de destino -->
  <path 
    d="M20,50 Q80,20 140,50 Q200,80 260,50"
    stroke="currentColor"
    stroke-width="2"
    stroke-dasharray="8 4"
    stroke-linecap="round"
    fill="none"
    opacity="0.15"
  />
  <!-- Marcadores de punto de inicio y destino -->
  <circle cx="20" cy="50" r="6" fill="currentColor" opacity="0.12"/>
  <circle cx="20" cy="50" r="3" fill="currentColor" opacity="0.2"/>
  
  <circle cx="140" cy="50" r="4" fill="currentColor" opacity="0.1"/>
  
  <circle cx="260" cy="50" r="6" fill="currentColor" opacity="0.12"/>
  <circle cx="260" cy="50" r="3" fill="currentColor" opacity="0.2"/>
  
  <!-- Pequeña flecha al final -->
  <path 
    d="M275,50 L265,44 M275,50 L265,56"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.2"
  />
</svg>
