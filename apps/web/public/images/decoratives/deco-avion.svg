<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Estela del avión -->
  <path d="M10,85 Q30,70 45,60 T70,45" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.35"/>
  
  <!-- Avión de papel -->
  <g transform="translate(70,35) rotate(-30)">
    <polygon points="0,12 25,0 0,0 5,6" fill="#2563eb" opacity="0.5"/>
    <polygon points="0,12 25,0 5,6" fill="#1e40af" opacity="0.4"/>
  </g>
  
  <!-- Puntos de la estela -->
  <circle cx="15" cy="80" r="2" fill="#2563eb" opacity="0.3"/>
  <circle cx="35" cy="65" r="1.5" fill="#2563eb" opacity="0.35"/>
  <circle cx="52" cy="52" r="1.5" fill="#2563eb" opacity="0.4"/>
</svg>
