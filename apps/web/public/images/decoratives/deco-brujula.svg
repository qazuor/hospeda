<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <!-- Círculo exterior -->
  <circle cx="40" cy="40" r="35" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.4"/>
  <circle cx="40" cy="40" r="30" fill="none" stroke="#2563eb" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Marcas cardinales -->
  <line x1="40" y1="8" x2="40" y2="15" stroke="#2563eb" stroke-width="2" opacity="0.5"/>
  <line x1="40" y1="65" x2="40" y2="72" stroke="#2563eb" stroke-width="1.5" opacity="0.4"/>
  <line x1="8" y1="40" x2="15" y2="40" stroke="#2563eb" stroke-width="1.5" opacity="0.4"/>
  <line x1="65" y1="40" x2="72" y2="40" stroke="#2563eb" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Flecha norte -->
  <polygon points="40,18 36,32 40,28 44,32" fill="#d97706" opacity="0.6"/>
  <!-- Flecha sur -->
  <polygon points="40,62 36,48 40,52 44,48" fill="#2563eb" opacity="0.4"/>
  
  <!-- Centro -->
  <circle cx="40" cy="40" r="3" fill="#2563eb" opacity="0.5"/>
  
  <!-- Letras -->
  <text x="40" y="7" text-anchor="middle" font-size="6" fill="#2563eb" opacity="0.5" font-family="sans-serif">N</text>
