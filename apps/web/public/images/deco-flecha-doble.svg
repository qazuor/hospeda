<svg xmlns="http://www.w3.org/2000/svg" width="120" height="40" viewBox="0 0 120 40">
  <!-- Línea principal punteada -->
  <line x1="10" y1="20" x2="110" y2="20" stroke="#2563eb" stroke-width="2" stroke-dasharray="8,4" opacity="0.4"/>
  
  <!-- Flecha izquierda -->
  <polygon points="10,20 20,14 20,26" fill="#2563eb" opacity="0.5"/>
  
  <!-- Flecha derecha -->
  <polygon points="110,20 100,14 100,26" fill="#2563eb" opacity="0.5"/>
  
  <!-- Punto central -->
  <circle cx="60" cy="20" r="4" fill="#d97706" opacity="0.5"/>
</svg>
