name: Setup
description: Install Node.js, pnpm, and project dependencies with cached pnpm store

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Get pnpm store directory
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    # Workaround for npm/cli#4828: pnpm's restored store cache sometimes
    # omits platform-specific optional dependencies (e.g. @rolldown's
    # native bindings used by tanstack/start-vite-plugin in the admin
    # app). The install reports success but later builds fail with
    # "Cannot find native binding". When that happens, --force fetches
    # everything from the registry and repopulates the missing bindings.
    - name: Verify native bindings (npm/cli#4828 workaround)
      shell: bash
      run: |
        binding_path=$(find node_modules/.pnpm -maxdepth 2 -type d -name '@rolldown+binding-*' 2>/dev/null | head -1)
        if [ -z "$binding_path" ]; then
          echo "::warning::No @rolldown/binding-* found in pnpm store, reinstalling with --force"
          pnpm install --frozen-lockfile --force
        else
          echo "Found rolldown binding at: $binding_path"
        fi
