# Dependabot configuration.
#
# Version updates open PRs against `staging` (the integration line), NOT the
# default branch `main`. All work in this repo flows through `staging` first;
# `main` is the validated baseline promoted from `staging`.
#
# NOTE: `target-branch` only governs *version updates* (the grouped weekly bumps
# below) — those land on `staging`. It does NOT govern *security updates*:
# GitHub opens those against the default branch `main`, ignoring `target-branch`.
# That is expected platform behavior. A `dependabot` PR based on `main` is, by
# construction, a security update; it may merge to `main` (CI green) and MUST be
# back-merged into `staging` afterward via `.github/workflows/sync-main-to-staging.yml`.
# See the "Dependabot security exception" section in CLAUDE.md for the full rule.
version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'staging'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    # Group updates to keep PR noise low in this pnpm monorepo: one PR for all
    # production minor/patch bumps, one for all dev minor/patch bumps. Majors
    # still open individual PRs so they get focused review.
    groups:
      production-minor-patch:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      development-minor-patch:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
    # Migration-gated packages. Their breaking changes arrive in MINOR bumps
    # (not majors), so the group rules above cannot isolate them — a single
    # minor bump can break the build/tests. Ignore ALL updates (incl. patch)
    # until the owning migration spec lands and lifts the ignore. Removing an
    # entry here is the deliberate trigger to take on that migration.
    #   - zod: 4.4 made `.merge()` throw on object schemas containing refinements
    #     (use `.safeExtend()`), breaking apps/admin env cross-validation and
    #     cascading into E2E. Owner: SPEC-132 (Zod 4 migration).
    #   - @tanstack/react-router: 1.131 -> 1.170 risks the documented /healthz
    #     path-intercept behavior (apps/admin/CLAUDE.md). Owner: SPEC-045
    #     (Vite/TanStack migration).
    #   - @astrojs/node: 10.1.4 imports `createRequestFromNodeRequest` from astro
    #     internals, which only exists in astro >= 6.4.0. apps/web pins astro
    #     ^6.3.3, so the web build fails with [MISSING_EXPORT]. Lift this ignore
    #     when web is moved to astro >= 6.4. Owner: SPEC-219 (astro 6.4 alignment).
    # Policy + routing: docs/guides/dependabot-policy.md (SPEC-219 T-003 / T-005).
    ignore:
      - dependency-name: 'zod'
      - dependency-name: '@tanstack/react-router'
      - dependency-name: '@astrojs/node'
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
    labels:
      - 'dependencies'

  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'staging'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - '*'
    commit-message:
      prefix: 'ci'
    labels:
      - 'dependencies'
      - 'github-actions'
