# Dependabot configuration.
#
# Version updates open PRs against `staging` (the integration line), NOT the
# default branch `main`. All work in this repo flows through `staging` first;
# `main` is the validated baseline promoted from `staging`.
#
# NOTE: `target-branch` only governs *version updates* (the grouped weekly bumps
# below) — those land on `staging`. It does NOT govern *security updates*:
# GitHub opens those against the default branch `main`, ignoring `target-branch`.
# That is expected platform behavior. A `dependabot` PR based on `main` is, by
# construction, a security update; it may merge to `main` (CI green) and MUST be
# back-merged into `staging` afterward via `.github/workflows/sync-main-to-staging.yml`.
# See the "Dependabot security exception" section in CLAUDE.md for the full rule.
version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'staging'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    # Group updates to keep PR noise low in this pnpm monorepo: one PR for all
    # production minor/patch bumps, one for all dev minor/patch bumps. Majors
    # still open individual PRs so they get focused review.
    groups:
      # Tiptap must move as ONE coordinated unit — core, every @tiptap/*
      # extension, and the tiptap-markdown companion share a major and
      # peer-lock together (a lone extension ahead of core is the runtime
      # mismatch behind the closed PR #1890 / the HOS-17 v3 migration).
      # Grouping ALL update types (incl. major) keeps a future v3 -> v4 bump a
      # single reviewable PR instead of per-package major PRs. Listed first so
      # tiptap deps land here rather than in the generic minor/patch groups.
      tiptap:
        patterns:
          - '@tiptap/*'
          - 'tiptap-markdown'
        update-types:
          - 'major'
          - 'minor'
          - 'patch'
      production-minor-patch:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      development-minor-patch:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
    # Migration-gated packages. Their breaking changes arrive in MINOR bumps
    # (not majors), so the group rules above cannot isolate them — a single
    # minor bump can break the build/tests. Ignore ALL updates (incl. patch)
    # until the owning migration spec lands and lifts the ignore. Removing an
    # entry here is the deliberate trigger to take on that migration.
    #   - zod: 4.4 made `.merge()` throw on object schemas containing refinements
    #     (use `.safeExtend()`), breaking apps/admin env cross-validation and
    #     cascading into E2E. Owner: SPEC-132 (Zod 4 migration).
    #   - jsdom: 26 -> 29 changes the accessible-name computation (whitespace
    #     concatenation), so role+name queries like DestinationReviewSidebarCard
    #     stop matching. Dev-only (test env; real browsers unaffected). Lift
    #     with a dedicated jsdom upgrade + test sweep. Owner: HOS-62.
    #   - @tanstack/react-form: 0.42.1 -> 1.33.0 is a 0.x -> 1.x major with a
    #     genuine breaking API surface, and Dependabot bumping only the direct
    #     dependency leaves the transitive @tanstack/form-core resolved at the
    #     old 0.x version, so the build fails with [MISSING_EXPORT] on
    #     mergeAndUpdate/FormGroupApi/uuid. apps/admin forms use
    #     @tanstack/react-form as the mandated pattern (CLAUDE.md) — real prod
    #     surface, not cosmetic. Owner: HOS-57.
    #   - expo / expo-*: Dependabot opens PRs for individual expo-* leaf packages
    #     (router, constants, linking, secure-store, splash-screen, web-browser)
    #     bumping 56.x -> 57.0.0, but never proposes bumping the core `expo`
    #     package (or expo-notifications/expo-network) itself, which stays on
    #     ~56.0.2 in apps/mobile/package.json. Merging any leaf package alone
    #     leaves a split-SDK state that Jest unit tests won't catch (they don't
    #     exercise the native module runtime). Gate the whole scope together,
    #     same pattern as @better-auth/* above. Owner: HOS-78.
    #     Unlike the zod/better-auth/etc entries above, expo/expo-* are
    #     scoped to `update-types: [semver-major]` only — the breaking changes
    #     found so far are all major-version jumps, so minor/patch (including
    #     security fixes) for the current major keep flowing through the normal
    #     grouped PRs instead of being blocked outright.
    # Policy + routing: docs/guides/dependabot-policy.md (SPEC-219 T-003 / T-005).
    ignore:
      - dependency-name: 'zod'
      - dependency-name: 'jsdom'
      - dependency-name: '@tanstack/react-form'
      - dependency-name: 'expo'
        update-types: ['version-update:semver-major']
      - dependency-name: 'expo-*'
        update-types: ['version-update:semver-major']
      # @radix-ui/*: the production-minor-patch group's Radix bumps (react-select
      # 2.2.6 -> 2.3.1, plus dialog/popover/avatar/slot/... minors) collectively
      # tip apps/admin's unit-test fork worker over its NATIVE V8 memory ceiling
      # (RegExpCompiler Zone allocator, NOT the JS heap — --logHeapUsage stays flat
      # at ~330-500MB) when rendering the heavy Radix-portal + cmdk + userEvent
      # dialog tests (PermissionPicker, *CredentialDialog, PromoCodeFormDialog),
      # crashing shard 5 with an OOM. Bisected across PRs #2054-2064: there is NO
      # single culprit package — reverting select/slot/overlays/{select+slot+tabs}
      # each still OOMs, only reverting ~all 13 clears it, so it's the aggregate
      # native-memory cost of the group. staging (older Radix) sits just under the
      # ceiling. The bumps are MINOR/patch, so this can't be scoped to majors like
      # astro/recharts/expo — the whole scope is gated. Lift when the admin test
      # native-memory ceiling is fixed (vmForks+vmMemoryLimit or heavy-test
      # isolation). Owner: HOS-80.
      - dependency-name: '@radix-ui/*'
      # @ai-sdk/openai + @ai-sdk/anthropic + ai: the Vercel AI SDK v4/v7 line
      # ships a LanguageModelV4 provider that the installed `ai` core's
      # generateText/streamText don't accept, so these three MUST move together
      # (bumping any one alone fails Build/Typecheck — see the adapter error in
      # packages/ai-core/src/providers/vercel-openai.adapter.ts). Dependabot kept
      # re-opening #2077/#2116 (openai), #2123 (anthropic), #2120 (ai) as
      # standalone bumps; gate them until the coordinated migration lands.
      # @ai-sdk/gateway is already on v4 (#2078, merged) and unaffected.
      # Owner: HOS-88.
      - dependency-name: '@ai-sdk/openai'
      - dependency-name: '@ai-sdk/anthropic'
      - dependency-name: 'ai'
    cooldown:
      # Supply-chain hardening: wait 7 days before bumping a newly published
      # version (satisfies semgrep dependabot-missing-cooldown).
      default-days: 7
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
    labels:
      - 'dependencies'

  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'staging'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - '*'
    cooldown:
      # Supply-chain hardening: wait 7 days before bumping a newly published
      # version (satisfies semgrep dependabot-missing-cooldown).
      default-days: 7
    commit-message:
      prefix: 'ci'
    labels:
      - 'dependencies'
      - 'github-actions'
