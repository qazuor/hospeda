name: A11y Sweep

on:
  workflow_dispatch:
  pull_request:
    branches:
      - staging

concurrency:
  group: a11y-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HOSPEDA_DATABASE_URL: postgresql://hospeda_user:hospeda_pass@localhost:5432/hospeda
  HOSPEDA_BETTER_AUTH_SECRET: ci-secret-min-32-characters-for-testing-only
  HOSPEDA_BETTER_AUTH_URL: http://localhost:3001/api/auth
  HOSPEDA_API_URL: http://localhost:3001
  HOSPEDA_SITE_URL: http://localhost:4321
  PUBLIC_API_URL: http://localhost:3001
  API_BASE_URL: http://localhost:3001
  PUBLIC_SITE_URL: http://localhost:4321
  HOSPEDA_ADMIN_URL: http://localhost:3000
  PUBLIC_ADMIN_URL: http://localhost:3000
  HOSPEDA_REVALIDATION_SECRET: ci-placeholder-revalidation-secret-min-32-characters
  # Required by the API runtime env schema (apps/api/src/utils/env.ts). Without
  # them the API process aborts on boot with "environment validation FAILED", the
  # health-wait loop times out silently, and the sweep's dynamic-route discovery
  # fails with "fetch failed" against localhost:3001. Same placeholders as e2e-pr.yml.
  HOSPEDA_LOCATION_SALT: e2e-location-salt-deterministic-min-32-characters
  HOSPEDA_VIEWS_HASH_SECRET: e2e-views-hash-secret-deterministic-min-32-chars
  HOSPEDA_NEWSLETTER_HMAC_SECRET: ci-placeholder-newsletter-hmac-secret-min-32-chars
  # PUBLIC_SENTRY_DSN / PUBLIC_POSTHOG_KEY are REQUIRED by the web env schema in
  # production, and `astro build` always runs in production mode regardless of
  # NODE_ENV — so they MUST be present at build time (an empty string fails the
  # URL check; omitting them fails the required check). Use the same
  # syntactically-valid placeholders as the CI workflow's build job: the sweep
  # bundle is never deployed, so fake values are fine. Keep in sync with ci.yml.
  PUBLIC_SENTRY_DSN: 'https://ci-placeholder.invalid'
  PUBLIC_POSTHOG_KEY: 'phc_ci_placeholder'
  # NODE_ENV is intentionally NOT set to production at the job level: a
  # production install skips devDependencies (husky, turbo, playwright, …),
  # which breaks `pnpm install` and the turbo build. It is applied only to the
  # server-runtime steps below, where production behaviour is actually wanted.
  API_PORT: 3001
  API_HOST: 0.0.0.0
  API_LOG_FORMAT: json
  HOSPEDA_NOINDEX_HOSTS: ''
  REQUIRE_DYNAMIC_ROUTES: '1'

jobs:
  a11y:
    name: A11y
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: hospeda_user
          POSTGRES_PASSWORD: hospeda_pass
          POSTGRES_DB: hospeda
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup

      - name: Build API and web
        run: pnpm turbo run build --filter=hospeda-api --filter=hospeda-web --filter=@repo/seed

      - name: Apply versioned migrations
        run: pnpm db:migrate

      - name: Apply extras
        run: pnpm db:apply-extras

      - name: Seed database
        run: pnpm db:seed

      - name: Install Playwright browsers
        run: pnpm --filter hospeda-web exec playwright install chromium --with-deps

      - name: Start API server
        env:
          NODE_ENV: production
        run: |
          node apps/api/dist/index.js &
          for i in $(seq 1 30); do
            if curl -s http://localhost:3001/health > /dev/null 2>&1; then
              echo "API ready"
              break
            fi
            sleep 2
          done
          # Fail loudly if the API never became ready, instead of letting a dead
          # server slip through to the sweep step (where it only shows as an opaque
          # "fetch failed"). A boot failure must surface here. See SPEC-294.
          curl -sf http://localhost:3001/health > /dev/null \
            || { echo "::error::API failed to become ready within 60s"; exit 1; }

      - name: Start web server
        env:
          NODE_ENV: production
        run: |
          node apps/web/dist/server/entry.mjs &
          READY=0
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4321/es/ 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "Web ready"
              READY=1
              break
            fi
            sleep 2
          done
          # Fail loudly if the web server never became ready (see API note above).
          [ "$READY" = "1" ] || { echo "::error::Web failed to become ready within 60s"; exit 1; }

      - name: Run a11y sweep
        run: pnpm --filter hospeda-web a11y:sweep
