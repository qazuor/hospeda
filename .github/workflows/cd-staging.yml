name: CD - Staging

on:
  push:
    branches:
      - staging

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  ci:
    name: Quality Check
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy-api:
    name: Deploy API to Vercel (Staging)
    needs: ci
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # SPEC-078-GAPS GAP-078-230: validate environment variables against
      # the canonical registry in @repo/config BEFORE deploying. Catches
      # missing/misnamed Cloudinary, DB, and auth vars before they reach
      # preview/staging traffic.
      - name: Validate environment variables
        run: pnpm env:check

      # Pin the staging deploy to api.staging.hospeda.ar so OAuth callbacks,
      # MercadoPago webhooks, and BetterStack monitors keep working across
      # redeploys. See docs/deployment/environments.md (Domain Pattern).
      - name: Deploy to Vercel (Preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_API }}
          working-directory: apps/api
          alias-domains: api.staging.hospeda.ar

  deploy-web:
    name: Deploy Web to Vercel (Staging)
    needs: ci
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # SPEC-078-GAPS GAP-078-230: validate environment variables against
      # the canonical registry in @repo/config BEFORE deploying.
      - name: Validate environment variables
        run: pnpm env:check

      # Pin the staging deploy to staging.hospeda.ar (web apex for staging).
      - name: Deploy to Vercel (Preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
          working-directory: apps/web
          alias-domains: staging.hospeda.ar

  deploy-admin:
    name: Deploy Admin to Vercel (Staging)
    needs: ci
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # SPEC-078-GAPS GAP-078-230: validate environment variables against
      # the canonical registry in @repo/config BEFORE deploying.
      - name: Validate environment variables
        run: pnpm env:check

      # Pin the staging deploy to admin.staging.hospeda.ar.
      - name: Deploy to Vercel (Preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
          working-directory: apps/admin
          alias-domains: admin.staging.hospeda.ar
