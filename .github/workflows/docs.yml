name: Documentation CI

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'apps/**/docs/**'
      - 'packages/**/docs/**'
      - '.markdownlint.json'
      - 'scripts/check-links.ts'
      - 'scripts/validate-examples.ts'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'apps/**/docs/**'
      - 'packages/**/docs/**'
      - '.markdownlint.json'
      - 'scripts/check-links.ts'
      - 'scripts/validate-examples.ts'

# Least-privilege default token: every job only reads the repo.
permissions:
  contents: read

jobs:
  lint:
    name: Lint Documentation
    runs-on: ubuntu-latest
    # SPEC-103 T-033: cap each job at 10 min. Audit reported docs CI
    # runs spanning 1-6 hours (workflow default = 6h). Neither script
    # below performs external I/O, so the hangs were most likely a
    # pnpm install or markdownlint glob edge case. 10 min is well
    # above the successful-run average (~2-3 min total).
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Markdown files
        run: pnpm run lint:md:docs

  check-links:
    name: Check Internal Links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check internal links
        run: pnpm run docs:check-links

  validate-examples:
    name: Validate TypeScript Examples
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate TypeScript code blocks
        run: pnpm run docs:validate-examples
