name: E2E (PR)

# SPEC-092 T-039: PR-time E2E suite. Runs P0 only with mocked external
# services. Target wall-clock: < 6 minutes.
#
# Runs on PRs targeting both `staging` and `main`. `staging` was added
# (issue #1547) so the suite exercises on every integration PR instead of
# only the rare `staging -> main` promotion — that infrequency is what let
# it bit-rot. This is a standalone check, separate from the product
# `CI Pass` gate; failures surface regressions in cross-app behavior (see the
# uploaded HTML report and Playwright trace for first-retry forensics).

on:
  pull_request:
    branches:
      - staging
      - main

concurrency:
  group: e2e-pr-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default token: the job reads the repo and uploads
# artifacts (artifact upload does not require contents: write).
permissions:
  contents: read

jobs:
  e2e-p0:
    name: E2E P0 Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      # NOTE: service container port mappings are evaluated before any steps
      # run, so they CANNOT be sourced from apps/e2e/.env.e2e. Keep them in
      # sync with the SSOT manually (apps/e2e/.env.e2e E2E_POSTGRES_PORT etc).
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: hospeda_user
          POSTGRES_PASSWORD: hospeda_pass
          POSTGRES_DB: hospeda_e2e
        ports:
          - 15433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 16380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 11025:1025
          - 18025:8025
        env:
          MP_MAX_MESSAGES: 5000
          MP_SMTP_AUTH_ACCEPT_ANY: 1
          MP_SMTP_AUTH_ALLOW_INSECURE: 1
        options: >-
          --health-cmd "wget -q --spider http://localhost:8025/api/v1/info"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Deterministic e2e secrets — isolated throwaway DB, NOT real secrets.
      # All three are min-32 per the API env schema; hardcoded (not repo secrets)
      # so the apps boot consistently and share one secret for cross-app auth.
      HOSPEDA_BETTER_AUTH_SECRET: e2e-better-auth-secret-deterministic-min-32-chars
      HOSPEDA_LOCATION_SALT: e2e-location-salt-deterministic-min-32-characters
      HOSPEDA_VIEWS_HASH_SECRET: e2e-views-hash-secret-deterministic-min-32-chars
      HOSPEDA_REVALIDATION_SECRET: ci-placeholder-revalidation-secret-min-32-characters
      HOSPEDA_NEWSLETTER_HMAC_SECRET: ci-placeholder-newsletter-hmac-secret-min-32-chars
      HOSPEDA_MAILER_HOST: localhost
      PUBLIC_SENTRY_DSN: https://ci-placeholder.invalid
      PUBLIC_POSTHOG_KEY: phc_ci_placeholder

      # MercadoPago: PR mode uses simulated webhook only (no real sandbox calls).
      # The webhook secret signs the simulated POST; the access_token is a stub,
      # but the QZPay adapter validates the format (must start with 'APP_USR-')
      # at billing init, so the stub has to match that shape or billing fails to
      # initialize and every entitlement-gated route errors.
      HOSPEDA_MERCADO_PAGO_ACCESS_TOKEN: APP_USR-0000000000000000-010125-00000000000000000000000000000000-000000000
      HOSPEDA_MERCADO_PAGO_PUBLIC_KEY: APP_USR-00000000-0000-0000-0000-000000000000
      HOSPEDA_MERCADO_PAGO_WEBHOOK_SECRET: ${{ secrets.HOSPEDA_MERCADO_PAGO_WEBHOOK_SECRET }}
      HOSPEDA_MERCADO_PAGO_SANDBOX: 'true'
      # SPEC-217: enable the QZPay test-control adapter so the fault-injection specs
      # (host-07c/res-01) mount the control endpoint and applyTestControl intercepts
      # the wrapped subscription ops. Gated to non-production by routes/index.ts.
      HOSPEDA_QZPAY_TEST_CONTROL_ENABLED: 'true'

      # Cloudinary: optional in PR (tests tagged @cloudinary skip when absent)
      HOSPEDA_CLOUDINARY_CLOUD_NAME: ${{ secrets.HOSPEDA_CLOUDINARY_CLOUD_NAME }}
      HOSPEDA_CLOUDINARY_API_KEY: ${{ secrets.HOSPEDA_CLOUDINARY_API_KEY }}
      HOSPEDA_CLOUDINARY_API_SECRET: ${{ secrets.HOSPEDA_CLOUDINARY_API_SECRET }}

      # Disable API response cache for deterministic e2e: tests mutate state
      # (publish/unpublish, subscription changes) and immediately assert the
      # public/entitlement read, which a cached response would serve stale.
      # NOTE: z.coerce.boolean() treats any NON-EMPTY string as true — so an
      # EMPTY string is the only way to set these false. Do not change '' to 'false'.
      API_CACHE_ENABLED: ''

      # Playwright tuning
      E2E_MODE: pr

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Load E2E port/URL vars from SSOT
        # Injects all non-secret vars from apps/e2e/.env.e2e into $GITHUB_ENV
        # so every subsequent step (build, seed, playwright) sees the same ports.
        # Secrets stay in the static env: block above.
        # keep in sync with apps/e2e/.env.e2e
        shell: bash
        run: |
          grep -vE '^\s*(#|$)' apps/e2e/.env.e2e >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter hospeda-e2e exec playwright install chromium --with-deps

      - name: Build apps
        run: pnpm exec turbo run build --filter=hospeda-api --filter=admin --filter=hospeda-web

      - name: Apply versioned Drizzle migrations to E2E database
        run: pnpm --filter @repo/db db:migrate
        env:
          HOSPEDA_DATABASE_URL: ${{ env.HOSPEDA_E2E_DATABASE_URL }}

      - name: Apply Postgres extras
        run: bash packages/db/scripts/apply-postgres-extras.sh "$HOSPEDA_E2E_DATABASE_URL"

      - name: Seed E2E database
        run: pnpm --filter hospeda-e2e e2e:seed

      - name: Run SEO validators + E2E P0 suite
        run: |
          set -euo pipefail

          pnpm --filter hospeda-api start > /tmp/hospeda-api.log 2>&1 &
          API_PID=$!
          pnpm --filter hospeda-web preview --port 18321 > /tmp/hospeda-web.log 2>&1 &
          WEB_PID=$!

          cleanup() {
            kill "$API_PID" "$WEB_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 60); do
            if curl -fsS "$HOSPEDA_E2E_API_URL/health" >/dev/null; then
              break
            fi
            sleep 2
          done

          for _ in $(seq 1 60); do
            if curl -fsS "$HOSPEDA_E2E_WEB_URL/es/" >/dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS "$HOSPEDA_E2E_API_URL/health" >/dev/null
          curl -fsS "$HOSPEDA_E2E_WEB_URL/es/" >/dev/null

          HOSPEDA_SEO_VALIDATOR_BASE_URL="$HOSPEDA_E2E_WEB_URL" pnpm exec tsx scripts/ci/seo-validator.ts
          HOSPEDA_SITEMAP_VALIDATOR_BASE_URL="$HOSPEDA_E2E_WEB_URL" pnpm exec tsx scripts/ci/sitemap-validator.ts

          # Lighthouse SEO CI guard (SPEC-268 acceptance criteria)
          # Runs against the already-started preview server; fails if any page scores < 90.
          echo "[Lighthouse] Running SEO audit..."
          HOSPEDA_SEO_VALIDATOR_BASE_URL="$HOSPEDA_E2E_WEB_URL" \
            pnpm --filter hospeda-web exec lhci autorun --config=./lighthouserc.json

          pnpm --filter hospeda-e2e e2e:test:p0
        env:
          PLAYWRIGHT_HTML_OPEN: never
          HOSPEDA_DATABASE_URL: ${{ env.HOSPEDA_E2E_DATABASE_URL }}
          API_PORT: '18001'
          HOSPEDA_SITE_URL: ${{ env.HOSPEDA_E2E_WEB_URL }}
          HOSPEDA_ADMIN_URL: ${{ env.HOSPEDA_E2E_ADMIN_URL }}
          API_CORS_ORIGINS: ${{ env.HOSPEDA_E2E_WEB_URL }},${{ env.HOSPEDA_E2E_ADMIN_URL }}
          API_RATE_LIMIT_ENABLED: ''
          API_RATE_LIMIT_AUTH_ENABLED: ''
          API_RATE_LIMIT_PUBLIC_ENABLED: ''
          API_RATE_LIMIT_ADMIN_ENABLED: ''

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-pr-${{ github.run_id }}
          path: apps/e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces-pr-${{ github.run_id }}
          path: apps/e2e/test-results/
          retention-days: 7
