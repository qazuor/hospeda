name: CD - Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  ci:
    name: Quality Check
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy-api:
    name: Deploy API to Vercel (Production)
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # SPEC-078-GAPS GAP-078-230: validate environment variables against
      # the canonical registry in @repo/config BEFORE deploying. Catches
      # missing/misnamed Cloudinary, DB, and auth vars before they reach
      # production traffic.
      - name: Validate environment variables
        run: pnpm env:check --ci
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_API }}
          vercel-args: '--prod'
          working-directory: apps/api

  deploy-web:
    name: Deploy Web to Vercel (Production)
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # SPEC-078-GAPS GAP-078-230: validate environment variables against
      # the canonical registry in @repo/config BEFORE deploying.
      - name: Validate environment variables
        run: pnpm env:check --ci
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
          vercel-args: '--prod'
          working-directory: apps/web

  deploy-admin:
    name: Deploy Admin to Vercel (Production)
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # SPEC-078-GAPS GAP-078-230: validate environment variables against
      # the canonical registry in @repo/config BEFORE deploying.
      - name: Validate environment variables
        run: pnpm env:check --ci
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
          vercel-args: '--prod'
          working-directory: apps/admin

  verify-production:
    name: Verify Production Health
    needs: [deploy-api, deploy-web, deploy-admin]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Wait for services to start
        run: sleep 30

      - name: Verify API health
        run: |
          curl --retry 5 --retry-delay 10 --retry-connrefused \
            --fail --silent --show-error \
            "${{ vars.HOSPEDA_API_URL }}/health/live"

      - name: Verify Web is reachable
        run: |
          curl --retry 5 --retry-delay 10 --retry-connrefused \
            --fail --silent --show-error \
            "${{ vars.HOSPEDA_SITE_URL }}"
