name: CD - Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  ci:
    name: Quality Check
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy-api:
    name: Deploy API to Vercel (Production)
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # SPEC-078-GAPS GAP-078-230: validate environment variables against
      # the canonical registry in @repo/config BEFORE deploying. Catches
      # missing/misnamed Cloudinary, DB, and auth vars before they reach
      # production traffic.
      - name: Validate environment variables
        # Hard gate: production deploys must not start with a known env drift.
        # If VERCEL_TOKEN is missing as a repo secret, the script exits 1 and
        # the workflow stops here on purpose — fix the secret before deploying.
        run: pnpm env:check --ci
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # Deploy from the repo root so Vercel can apply each project's
      # Root Directory setting (apps/api, apps/web, apps/admin) to the
      # checkout. Running from inside the app directory would result in
      # the path being doubled (apps/api/apps/api). Vercel runs the build
      # remotely; --prebuilt would require a successful local
      # `vercel build` which fails on this monorepo with "spawn sh ENOENT".
      - name: Deploy API to Vercel
        run: npx --yes vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_API }}

      # Sync Upstash QStash schedules with the cron registry after each
      # successful API deploy. The script is idempotent: it creates new
      # schedules, updates changed cron expressions, and removes orphans.
      # Skipped silently when QSTASH_TOKEN is not configured (e.g. forks).
      - name: Sync QStash schedules with cron registry
        if: env.QSTASH_TOKEN != ''
        run: pnpm tsx scripts/setup-qstash-schedules.ts
        env:
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          HOSPEDA_API_URL: ${{ vars.HOSPEDA_API_URL }}

  deploy-web:
    name: Deploy Web to Vercel (Production)
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # SPEC-078-GAPS GAP-078-230: validate environment variables against
      # the canonical registry in @repo/config BEFORE deploying.
      - name: Validate environment variables
        # Hard gate: production deploys must not start with a known env drift.
        # If VERCEL_TOKEN is missing as a repo secret, the script exits 1 and
        # the workflow stops here on purpose — fix the secret before deploying.
        run: pnpm env:check --ci
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Web to Vercel
        run: npx --yes vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

  deploy-admin:
    name: Deploy Admin to Vercel (Production)
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # SPEC-078-GAPS GAP-078-230: validate environment variables against
      # the canonical registry in @repo/config BEFORE deploying.
      - name: Validate environment variables
        # Hard gate: production deploys must not start with a known env drift.
        # If VERCEL_TOKEN is missing as a repo secret, the script exits 1 and
        # the workflow stops here on purpose — fix the secret before deploying.
        run: pnpm env:check --ci
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Admin to Vercel
        run: npx --yes vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}

  verify-production:
    name: Verify Production Health
    needs: [deploy-api, deploy-web, deploy-admin]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Wait for services to start
        run: sleep 30

      - name: Verify API health
        run: |
          curl --retry 5 --retry-delay 10 --retry-connrefused \
            --fail --silent --show-error \
            "${{ vars.HOSPEDA_API_URL }}/health/live"

      - name: Verify Web is reachable
        run: |
          curl --retry 5 --retry-delay 10 --retry-connrefused \
            --fail --silent --show-error \
            "${{ vars.HOSPEDA_SITE_URL }}"
