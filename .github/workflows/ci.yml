name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_call:

# Shared env values used by every job. Secrets are injected per job (jobs
# that don't need them simply ignore the missing values).
env:
  HOSPEDA_DATABASE_URL: ${{ secrets.HOSPEDA_DATABASE_URL }}
  HOSPEDA_BETTER_AUTH_SECRET: ${{ secrets.HOSPEDA_BETTER_AUTH_SECRET }}
  HOSPEDA_API_URL: ${{ secrets.HOSPEDA_API_URL }}
  HOSPEDA_SITE_URL: ${{ secrets.HOSPEDA_SITE_URL }}
  VITE_API_URL: ${{ secrets.HOSPEDA_API_URL }}
  VITE_SITE_URL: ${{ secrets.HOSPEDA_SITE_URL }}
  VITE_BETTER_AUTH_URL: ${{ secrets.HOSPEDA_API_URL }}/api/auth
  PUBLIC_API_URL: ${{ secrets.HOSPEDA_API_URL }}
  PUBLIC_SITE_URL: ${{ secrets.HOSPEDA_SITE_URL }}
  HOSPEDA_CLOUDINARY_CLOUD_NAME: ${{ secrets.HOSPEDA_CLOUDINARY_CLOUD_NAME }}
  HOSPEDA_CLOUDINARY_API_KEY: ${{ secrets.HOSPEDA_CLOUDINARY_API_KEY }}
  HOSPEDA_CLOUDINARY_API_SECRET: ${{ secrets.HOSPEDA_CLOUDINARY_API_SECRET }}

jobs:
  # ------------------------------------------------------------------
  # Fast feedback: linting, formatting, code style. ~2 min.
  # ------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Biome lint
        run: pnpm lint

  # ------------------------------------------------------------------
  # Security checks: dependency audit + SAST. ~3 min.
  # ------------------------------------------------------------------
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Audit production dependencies (critical/high)
        run: pnpm audit --prod --audit-level=high
      - name: Semgrep SAST scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/nodejs
            p/owasp-top-ten
            p/secrets
        env:
          SEMGREP_RULES: p/typescript p/nodejs p/owasp-top-ten p/secrets

  # ------------------------------------------------------------------
  # Repository-wide guard scripts. Independent of build, runs in
  # parallel for fast feedback. ~2 min.
  # ------------------------------------------------------------------
  guards:
    name: Guards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Check CSP-incompatible patterns
        run: bash scripts/check-csp-patterns.sh
      - name: Check for unsafe ilike() usage
        run: bash scripts/check-unsafe-ilike.sh
      - name: Check Cloudinary SDK isolation
        run: bash scripts/check-cloudinary-isolation.sh
      - name: Check bare Cloudinary <img>
        run: bash scripts/check-bare-cloudinary-img.sh
      - name: Check 'as unknown as' type-cast count (SPEC-039)
        run: bash scripts/check-type-casts.sh
      - name: Check service getById test pattern (SPEC-083)
        run: bash scripts/check-getbyid-tests.sh
      - name: Check is:inline blocks carry CSP nonce (SPEC-047)
        run: bash scripts/check-inline-nonce.sh
      - name: Check for disabled tests (.only/.skip)
        run: |
          echo "Checking for .only() test isolation..."
          if grep -rn "\.only(" apps/*/test packages/*/test --include="*.test.ts" 2>/dev/null; then
            echo "ERROR: Found .only() in test files. Remove before merging."
            exit 1
          fi
          echo "Checking for hard-coded .skip()..."
          if grep -rn "\.skip(" apps/*/test packages/*/test --include="*.test.ts" 2>/dev/null | grep -v "skipIf" | grep -v "skip\.if"; then
            echo "ERROR: Found hard-coded .skip() in test files. Use it.skipIf() for conditional skips."
            exit 1
          fi
          echo "No disabled tests found."

  # ------------------------------------------------------------------
  # i18n parity: locale completeness + Zod key sync. ~1 min.
  # ------------------------------------------------------------------
  docs:
    name: Docs and i18n
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Verify i18n key sync (GAP-010)
        run: npx tsx scripts/extract-zod-keys.ts --verify
      - name: Verify i18n locale parity (SPEC-096 T-065)
        run: pnpm --filter @repo/i18n check-locales

  # ------------------------------------------------------------------
  # Build all packages and apps. Required by typecheck and tests.
  # ~5 min.
  # ------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build all packages and apps
        run: pnpm build

  # ------------------------------------------------------------------
  # TypeScript validation. Depends on build because some packages emit
  # .d.ts files needed by downstream consumers. ~5 min.
  # ------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build (turbo cache)
        run: pnpm build
      - name: Type check
        run: pnpm typecheck

  # ------------------------------------------------------------------
  # Unit tests with coverage. Depends on build for any package that
  # consumes built artifacts. ~10 min.
  # ------------------------------------------------------------------
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build (turbo cache)
        run: pnpm build
      - name: Run tests with coverage
        run: pnpm test:coverage
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summaries
          path: '**/coverage/coverage-summary.json'
          if-no-files-found: warn
          retention-days: 7

  # ------------------------------------------------------------------
  # Integration tests requiring a real PostgreSQL instance.
  # Independent of unit tests so a unit failure doesn't hide
  # integration regressions. ~7 min.
  # ------------------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: hospeda_user
          POSTGRES_PASSWORD: hospeda_pass
          POSTGRES_DB: postgres
        ports:
          - 5436:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build (turbo cache)
        run: pnpm build
      - name: Run integration tests (SPEC-061 db + SPEC-080 service-core)
        run: pnpm test:integration
        env:
          HOSPEDA_TEST_DATABASE_URL: postgresql://hospeda_user:hospeda_pass@localhost:5436/postgres

  # ------------------------------------------------------------------
  # Coverage threshold check. Reads the coverage artifacts produced by
  # test-unit and enforces per-package floors. ~30s.
  # ------------------------------------------------------------------
  coverage-check:
    name: Coverage Threshold
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: test-unit
    steps:
      - uses: actions/checkout@v4
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-summaries
          path: coverage-artifacts/
      - name: Check coverage threshold
        run: |
          echo "📊 Checking coverage threshold..."

          COVERAGE_FILES=$(find coverage-artifacts -name 'coverage-summary.json' 2>/dev/null)

          if [ -z "$COVERAGE_FILES" ]; then
            echo "❌ No coverage files found"
            exit 1
          fi

          FAILED=0
          TOTAL_COVERAGE=0
          FILE_COUNT=0

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Coverage Report by Package"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          for file in $COVERAGE_FILES; do
            # Path layout: coverage-artifacts/<workspace-relative-path>/coverage/coverage-summary.json
            PACKAGE_PATH=$(dirname $(dirname "$file"))
            PACKAGE_NAME=$(basename "$PACKAGE_PATH")

            COVERAGE=$(jq -r '.total.lines.pct' "$file")
            COVERAGE_ROUNDED=$(printf "%.2f" "$COVERAGE")

            echo ""
            echo "📦 Package: $PACKAGE_NAME"
            echo "   Coverage: $COVERAGE_ROUNDED%"

            # Determine threshold per package. The web, admin, and api
            # apps use lower bars because most surfaces are framework-
            # specific (Astro SSR components, TanStack Router routes,
            # React islands) or integration-shaped tests that mock route
            # handlers via vi.spyOn (v8 cannot follow the indirection).
            # Their behavior is verified through page-level, integration,
            # and E2E tests instead of per-file unit coverage.
            THRESHOLD=90
            if [ "$PACKAGE_NAME" = "web" ]; then
              THRESHOLD=55
            elif [ "$PACKAGE_NAME" = "admin" ]; then
              THRESHOLD=50
            elif [ "$PACKAGE_NAME" = "api" ]; then
              THRESHOLD=75
            fi

            if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
              echo "   ❌ FAIL: Coverage below ${THRESHOLD}% threshold"
              FAILED=1
            else
              echo "   ✅ PASS: Coverage meets ${THRESHOLD}% threshold"
            fi

            TOTAL_COVERAGE=$(echo "$TOTAL_COVERAGE + $COVERAGE" | bc)
            FILE_COUNT=$((FILE_COUNT + 1))
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ $FILE_COUNT -gt 0 ]; then
            GLOBAL_COVERAGE=$(echo "scale=2; $TOTAL_COVERAGE / $FILE_COUNT" | bc)
            echo "🌍 Global Average Coverage: $GLOBAL_COVERAGE%"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          if [ $FAILED -eq 1 ]; then
            echo "❌ Coverage check failed: One or more packages below their threshold"
            exit 1
          else
            echo "✅ All packages meet their coverage thresholds"
          fi

  # ------------------------------------------------------------------
  # Aggregator job. Used by cd-production.yml as a single dependency
  # via `needs: ci` so we don't have to list every leaf job there.
  # ------------------------------------------------------------------
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - security
      - guards
      - docs
      - build
      - typecheck
      - test-unit
      - test-integration
      - coverage-check
    steps:
      - name: Aggregate result
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] \
            || [ "${{ needs.security.result }}" != "success" ] \
            || [ "${{ needs.guards.result }}" != "success" ] \
            || [ "${{ needs.docs.result }}" != "success" ] \
            || [ "${{ needs.build.result }}" != "success" ] \
            || [ "${{ needs.typecheck.result }}" != "success" ] \
            || [ "${{ needs.test-unit.result }}" != "success" ] \
            || [ "${{ needs.test-integration.result }}" != "success" ] \
            || [ "${{ needs.coverage-check.result }}" != "success" ]; then
            echo "❌ One or more checks failed"
            exit 1
          fi
          echo "✅ All checks passed"
