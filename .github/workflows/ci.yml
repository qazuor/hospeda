name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_call:

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      # PostgreSQL service container for SPEC-061 integration tests.
      # Same image/credentials as docker-compose.yml for parity. The test DB
      # itself (`hospeda_integration_test`) is created by global-setup.ts.
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: hospeda_user
          POSTGRES_PASSWORD: hospeda_pass
          POSTGRES_DB: postgres
        ports:
          - 5436:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Database
      HOSPEDA_DATABASE_URL: ${{ secrets.HOSPEDA_DATABASE_URL }}

      # Better Auth
      HOSPEDA_BETTER_AUTH_SECRET: ${{ secrets.HOSPEDA_BETTER_AUTH_SECRET }}

      # Application URLs
      HOSPEDA_API_URL: ${{ secrets.HOSPEDA_API_URL }}
      HOSPEDA_SITE_URL: ${{ secrets.HOSPEDA_SITE_URL }}

      # Admin app (Vite format) — required for build-time env validation
      VITE_API_URL: ${{ secrets.HOSPEDA_API_URL }}
      VITE_SITE_URL: ${{ secrets.HOSPEDA_SITE_URL }}
      VITE_BETTER_AUTH_URL: ${{ secrets.HOSPEDA_API_URL }}/api/auth

      # Web app (Astro PUBLIC_ format)
      PUBLIC_API_URL: ${{ secrets.HOSPEDA_API_URL }}
      PUBLIC_SITE_URL: ${{ secrets.HOSPEDA_SITE_URL }}

      # Cloudinary (consumed by integration tests in @repo/media and @repo/seed)
      HOSPEDA_CLOUDINARY_CLOUD_NAME: ${{ secrets.HOSPEDA_CLOUDINARY_CLOUD_NAME }}
      HOSPEDA_CLOUDINARY_API_KEY: ${{ secrets.HOSPEDA_CLOUDINARY_API_KEY }}
      HOSPEDA_CLOUDINARY_API_SECRET: ${{ secrets.HOSPEDA_CLOUDINARY_API_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies (critical/high)
        run: pnpm audit --prod --audit-level=high

      - name: Semgrep SAST scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/nodejs
            p/owasp-top-ten
            p/secrets
        env:
          SEMGREP_RULES: p/typescript p/nodejs p/owasp-top-ten p/secrets

      - name: Build all packages and apps
        run: pnpm build

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Check CSP-incompatible patterns
        run: bash scripts/check-csp-patterns.sh

      - name: Check for unsafe ilike() usage
        run: bash scripts/check-unsafe-ilike.sh

      - name: Check Cloudinary SDK isolation
        run: bash scripts/check-cloudinary-isolation.sh

      - name: Check bare Cloudinary <img>
        run: bash scripts/check-bare-cloudinary-img.sh

      - name: Check 'as unknown as' type-cast count (SPEC-039)
        run: bash scripts/check-type-casts.sh

      - name: Check service getById test pattern (SPEC-083)
        run: bash scripts/check-getbyid-tests.sh

      - name: Check is:inline blocks carry CSP nonce (SPEC-047)
        run: bash scripts/check-inline-nonce.sh

      - name: Check for disabled tests (.only/.skip)
        run: |
          echo "Checking for .only() test isolation..."
          if grep -rn "\.only(" apps/*/test packages/*/test --include="*.test.ts" 2>/dev/null; then
            echo "ERROR: Found .only() in test files. Remove before merging."
            exit 1
          fi
          echo "Checking for hard-coded .skip()..."
          if grep -rn "\.skip(" apps/*/test packages/*/test --include="*.test.ts" 2>/dev/null | grep -v "skipIf" | grep -v "skip\.if"; then
            echo "ERROR: Found hard-coded .skip() in test files. Use it.skipIf() for conditional skips."
            exit 1
          fi
          echo "No disabled tests found."

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Run integration tests (SPEC-061 db + SPEC-080 service-core)
        run: pnpm test:integration
        env:
          HOSPEDA_TEST_DATABASE_URL: postgresql://hospeda_user:hospeda_pass@localhost:5436/postgres

      - name: Verify i18n key sync (GAP-010)
        run: npx tsx scripts/extract-zod-keys.ts --verify

      - name: Verify i18n locale parity (SPEC-096 T-065)
        run: pnpm --filter @repo/i18n check-locales

      - name: Check coverage threshold
        run: |
          echo "📊 Checking coverage threshold..."

          # Find all coverage-summary.json files in the monorepo
          COVERAGE_FILES=$(find . -name 'coverage-summary.json' -path '*/coverage/*' 2>/dev/null)

          if [ -z "$COVERAGE_FILES" ]; then
            echo "❌ No coverage files found"
            exit 1
          fi

          FAILED=0
          TOTAL_COVERAGE=0
          FILE_COUNT=0

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Coverage Report by Package"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          for file in $COVERAGE_FILES; do
            # Extract package name from path
            PACKAGE_PATH=$(dirname $(dirname "$file"))
            PACKAGE_NAME=$(basename "$PACKAGE_PATH")

            # Get coverage percentage
            COVERAGE=$(jq -r '.total.lines.pct' "$file")

            # Round coverage to 2 decimals
            COVERAGE_ROUNDED=$(printf "%.2f" "$COVERAGE")

            echo ""
            echo "📦 Package: $PACKAGE_NAME"
            echo "   Coverage: $COVERAGE_ROUNDED%"

            # Determine threshold per package. The web app uses a lower
            # bar because most surfaces are Astro SSR components and
            # React islands that cannot render in Vitest's jsdom; their
            # behavior is verified through page-level and E2E tests
            # instead of per-file unit coverage.
            THRESHOLD=90
            if [ "$PACKAGE_NAME" = "web" ]; then
              THRESHOLD=55
            fi

            # Check if below threshold
            if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
              echo "   ❌ FAIL: Coverage below ${THRESHOLD}% threshold"
              FAILED=1
            else
              echo "   ✅ PASS: Coverage meets ${THRESHOLD}% threshold"
            fi

            # Accumulate for global average
            TOTAL_COVERAGE=$(echo "$TOTAL_COVERAGE + $COVERAGE" | bc)
            FILE_COUNT=$((FILE_COUNT + 1))
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Calculate global average
          if [ $FILE_COUNT -gt 0 ]; then
            GLOBAL_COVERAGE=$(echo "scale=2; $TOTAL_COVERAGE / $FILE_COUNT" | bc)
            echo "🌍 Global Average Coverage: $GLOBAL_COVERAGE%"
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          if [ $FAILED -eq 1 ]; then
            echo "❌ Coverage check failed: One or more packages below their threshold"
            exit 1
          else
            echo "✅ All packages meet their coverage thresholds"
          fi

      - name: Summary
        if: always()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 CI Summary"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ All checks passed!"
            echo ""
            echo "✓ Type check: PASSED"
            echo "✓ Lint: PASSED"
            echo "✓ Tests: PASSED"
            echo "✓ Coverage: ≥90%"
          else
            echo "❌ Some checks failed"
            echo ""
            echo "Review the logs above for details"
          fi
          echo ""
