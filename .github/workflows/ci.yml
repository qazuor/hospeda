name: CI

# Runner strategy: every job runs on GitHub-hosted ubuntu-latest.
#
# The repo is public, so GitHub-hosted Actions minutes are free AND unlimited,
# and jobs run on ~20 parallel hosted runners. The previous SPEC-179 dynamic
# strategy routed PR/staging CI to a single self-hosted runner (leo-laptop) to
# save private-repo minutes, but that serialized all jobs onto one machine and
# created long queues under load. Going public makes the self-hosted routing
# both unnecessary (hosted is free) and harmful (it was the bottleneck), so it
# was reverted here. The semgrep-CLI migration and turbo remote cache are kept
# (they help on hosted too). The self-hosted runner can now be decommissioned.

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_call:

# Cancel in-progress runs for the same PR when a new push arrives.
# Pushes to main never cancel (we want every commit on main to build).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

# Shared env values used by every job. Secrets are injected per job (jobs
# that don't need them simply ignore the missing values).
env:
  HOSPEDA_DATABASE_URL: ${{ secrets.HOSPEDA_DATABASE_URL }}
  HOSPEDA_BETTER_AUTH_SECRET: ${{ secrets.HOSPEDA_BETTER_AUTH_SECRET }}
  # URL vars below feed build-time env validation (apps/admin runs Zod
  # z.string().url() during `vite build`; apps/web validates PUBLIC_* in its
  # Astro build). Dependabot-triggered workflow runs execute WITHOUT access to
  # repository secrets, so secrets.* arrive as empty strings, fail URL
  # validation, and abort admin#build. We fall back to a syntactically-valid but
  # deliberately non-functional placeholder (RFC 2606 reserved `.invalid` TLD) so
  # the build passes; the build never dereferences these URLs. Real push/branch
  # runs still receive the real secret values; deploy builds (Coolify) never see
  # the placeholder, and a guard rejects it outside CI (SPEC-219 T-002 / T-006).
  HOSPEDA_API_URL: ${{ secrets.HOSPEDA_API_URL || 'https://example.invalid' }}
  HOSPEDA_SITE_URL: ${{ secrets.HOSPEDA_SITE_URL || 'https://example.invalid' }}
  VITE_API_URL: ${{ secrets.HOSPEDA_API_URL || 'https://example.invalid' }}
  VITE_SITE_URL: ${{ secrets.HOSPEDA_SITE_URL || 'https://example.invalid' }}
  # VITE_ADMIN_URL (SPEC-182) is a required URL for the admin build. There is no
  # HOSPEDA_ADMIN_URL secret today, so this resolves to the placeholder; if that
  # secret is ever added it is used instead. Without this line, any admin#build
  # cache MISS (incl. an admin code change on push) fails validation, since the
  # var was previously absent from the Build job env entirely.
  VITE_ADMIN_URL: ${{ secrets.HOSPEDA_ADMIN_URL || 'https://example.invalid' }}
  VITE_BETTER_AUTH_URL: ${{ secrets.HOSPEDA_API_URL || 'https://example.invalid' }}/api/auth
  PUBLIC_API_URL: ${{ secrets.HOSPEDA_API_URL || 'https://example.invalid' }}
  PUBLIC_SITE_URL: ${{ secrets.HOSPEDA_SITE_URL || 'https://example.invalid' }}
  HOSPEDA_CLOUDINARY_CLOUD_NAME: ${{ secrets.HOSPEDA_CLOUDINARY_CLOUD_NAME }}
  HOSPEDA_CLOUDINARY_API_KEY: ${{ secrets.HOSPEDA_CLOUDINARY_API_KEY }}
  HOSPEDA_CLOUDINARY_API_SECRET: ${{ secrets.HOSPEDA_CLOUDINARY_API_SECRET }}
  # Turbo Remote Cache (OPTIONAL).
  #
  # This is a CACHE service for Turborepo build/lint/typecheck artifacts,
  # NOT a deployment platform. Hospeda's hosting moved off Vercel to
  # Coolify on a VPS in Phase 16.3, but Turbo Remote Cache (provided by
  # Vercel as an independent service) still accelerates CI ~30-50% by
  # reusing artifacts across runs. The repo retains the option to use it.
  #
  # Behavior when TURBO_TOKEN / TURBO_TEAM are NOT set as repo secrets:
  # every job falls back to local cache silently (no failure, just
  # slower). To disable the remote cache entirely, leave both secrets
  # unset on the repository. To rotate keys, update the secrets in
  # Settings → Secrets and variables → Actions.
  #
  # Token provisioning (only needed when enabling Remote Cache):
  #   1. Sign up at vercel.com (or use an existing Vercel account — no
  #      project needs to be deployed there).
  #   2. Go to Account Settings → Tokens → create a token scoped to a
  #      team. Copy it to the TURBO_TOKEN repo secret.
  #   3. Set TURBO_TEAM as a repo variable to the team slug.
  #   4. (Optional) Generate a TURBO_REMOTE_CACHE_SIGNATURE_KEY (any
  #      32+ byte secret) for cache artifact signature verification.
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

jobs:
  # ------------------------------------------------------------------
  # Fast feedback: linting, formatting, code style. ~2 min.
  # ------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Biome lint
        run: pnpm lint
      - name: Validate admin sidebar routes (SPEC-154)
        # Asserts every config-driven sidebar link resolves to a real
        # TanStack route (AC-22 regression gate). Type-only imports + a
        # routes-dir scan — no build required.
        run: pnpm --filter admin run validate:sidebar-routes

  # ------------------------------------------------------------------
  # Security checks: dependency audit + SAST. ~3-4 min.
  # ------------------------------------------------------------------
  security:
    name: Security
    # Uses the semgrep CLI (via uv) instead of the archived
    # `semgrep/semgrep-action@v1` Docker action. Rule packs are identical:
    # p/typescript, p/nodejs, p/owasp-top-ten, p/secrets. `--error` makes
    # semgrep exit non-zero on any finding, preserving the old action's gate.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Audit production dependencies (critical/high)
        run: pnpm audit --prod --audit-level=high
      - name: Install uv (provides Python + semgrep CLI)
        # uv fetches a pinned, semgrep-compatible Python (3.12) without relying
        # on the GitHub tool-cache (which actions/setup-python lacks for some
        # OSes). The official installer is used directly: astral-sh/setup-uv@v8
        # was observed hanging ~9min in CI and tripping the job timeout.
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Semgrep SAST scan
        # uvx runs semgrep 1.164.0 (pinned for a deterministic gate) on an
        # isolated Python 3.12 env. Same rule packs + --error gate as the old
        # semgrep-action. semgrep is pinned so the same commit can't pass one
        # day and fail the next on changed rules.
        run: >-
          uvx --python 3.12 --from semgrep==1.164.0 semgrep scan
          --config p/typescript
          --config p/nodejs
          --config p/owasp-top-ten
          --config p/secrets
          --error

  # ------------------------------------------------------------------
  # Repository-wide guard scripts + i18n/docs parity checks (SPEC-103
  # T-036: consolidated from `guards` + `docs` jobs to amortise the
  # ~30s setup overhead per job. ~3 min total.
  # ------------------------------------------------------------------
  guards:
    name: Guards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Check CSP-incompatible patterns
        run: bash scripts/check-csp-patterns.sh
      - name: Check for unsafe ilike() usage
        run: bash scripts/check-unsafe-ilike.sh
      - name: Check Cloudinary SDK isolation
        run: bash scripts/check-cloudinary-isolation.sh
      - name: Check bare Cloudinary <img>
        run: bash scripts/check-bare-cloudinary-img.sh
      - name: Check 'as unknown as' type-cast count (SPEC-039)
        run: bash scripts/check-type-casts.sh
      - name: Check service getById test pattern (SPEC-083)
        run: bash scripts/check-getbyid-tests.sh
      - name: Check is:inline blocks carry CSP nonce (SPEC-047)
        run: bash scripts/check-inline-nonce.sh
      - name: Check for disabled tests (.only/.skip)
        run: |
          echo "Checking for .only() test isolation..."
          if grep -rn "\.only(" apps/*/test packages/*/test --include="*.test.ts" 2>/dev/null; then
            echo "ERROR: Found .only() in test files. Remove before merging."
            exit 1
          fi
          echo "Checking for hard-coded .skip()..."
          if grep -rn "\.skip(" apps/*/test packages/*/test --include="*.test.ts" 2>/dev/null | grep -v "skipIf" | grep -v "skip\.if"; then
            echo "ERROR: Found hard-coded .skip() in test files. Use it.skipIf() for conditional skips."
            exit 1
          fi
          echo "No disabled tests found."
      - name: Verify i18n key sync (GAP-010)
        run: npx tsx scripts/extract-zod-keys.ts --verify
      - name: Verify i18n locale parity (SPEC-096 T-065)
        run: pnpm --filter @repo/i18n check-locales
      - name: Check schema drift (SPEC-178)
        run: bash scripts/check-schema-drift.sh
      - name: Web must not call admin API tier (BETA-73)
        run: |
          if grep -rn "/api/v1/admin" apps/web/src; then
            echo "::error::apps/web must only use /public/ and /protected/ API tiers, never /admin/"
            exit 1
          fi
          echo "OK: no admin-tier API calls in apps/web/src"
      - name: Env registry parity (SPEC-035)
        run: pnpm env:check:registry

  # ------------------------------------------------------------------
  # Build all packages and apps. Required by typecheck and tests.
  # ~5 min. Uploads build outputs as a single `build-outputs` artifact
  # so downstream jobs (typecheck, test-unit shards, test-integration)
  # can skip their own `pnpm build` step (SPEC-103 T-032). Saves
  # ~5 min per downstream job (~20 min CPU per run before the change
  # because every needs:build job re-ran the full build to warm the
  # turbo cache, which is per-runner-fs and never shared across jobs).
  # ------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build all packages and apps
        run: pnpm build
        env:
          # Dependabot (and any secret-less) CI runs fall back to placeholder
          # `.invalid` URLs (see the workflow-level env above) so the admin
          # build's Zod URL validation passes. This flag tells the admin env
          # guard to ACCEPT that placeholder — and it is set ONLY here, in the CI
          # Build step. Deploy builds (Coolify) never set it, so a real build
          # misconfigured with a placeholder URL fails loudly. It is deliberately
          # NOT in the workflow-level env, so the test job keeps the guard active
          # and exercises the rejection path. (SPEC-219 T-006)
          ALLOW_PLACEHOLDER_ENV_URLS: 'true'
      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          retention-days: 1
          include-hidden-files: true
          path: |
            .turbo
            apps/*/dist
            apps/web/.astro
            apps/admin/.output
            apps/admin/.tanstack
            apps/admin/src/routeTree.gen.ts
            packages/*/dist

  # ------------------------------------------------------------------
  # TypeScript validation. Depends on build because some packages emit
  # .d.ts files needed by downstream consumers. ~5 min.
  # ------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-outputs
      - name: Type check
        run: pnpm typecheck

  # ------------------------------------------------------------------
  # Unit tests with coverage. Sharded 4-way using vitest --shard=N/M.
  # Each shard runs all packages but processes only its slice of test
  # files, then uploads coverage as a per-shard artifact. The
  # coverage-check job downloads all shards and merges them per package
  # before enforcing thresholds. Depends on build for any package that
  # consumes built artifacts. ~5 min per shard (was ~21 min single).
  # ------------------------------------------------------------------
  test-unit:
    name: Unit Tests (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    # SPEC-103 T-032 landed: shards now download build-outputs artifact
    # instead of rebuilding. Originally calibrated at 13-15 min/shard (PR
    # #1060), capped at 20. The suite has since grown substantially
    # (SPEC-165 comments, SPEC-170 permission panel, SPEC-177 FAQ, plus the
    # baseline-recovery additions), pushing every shard to ~18-20 min — so
    # shards 1 and 3 began hitting the 20 min cap and getting cancelled on
    # ubuntu-latest. Raised to 30 to absorb the growth (and the slower
    # self-hosted leo-laptop used on PRs). vitest --shard slices by file
    # hash, not by duration, so shards are inherently uneven; if this keeps
    # creeping, rebalance the heaviest files (admin component + userEvent
    # suites) rather than just raising the cap again.
    timeout-minutes: 30
    needs: build
    # Raise fork count on CI: each shard runs in an isolated VM so the
    # machine-safety ceiling that applies locally (maxForks=3) does not
    # constrain here. VITEST_MAX_FORKS=4 gives a small throughput boost.
    # See docs/guides/test-performance.md for the full rationale.
    env:
      VITEST_MAX_FORKS: 4
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-outputs
      # Coverage is expensive (v8 instrumentation is ~3x slower than a
      # plain vitest run). We only need it on main pushes — that is where
      # coverage-check enforces the per-package threshold gate. PRs and
      # pushes to staging run the cheaper `test` script instead.
      #
      # `VITEST_SHARD` is part of the turbo cache key (see turbo.json),
      # so different shards never share a cache entry. That means we no
      # longer need `--force`, which previously invalidated the BUILD
      # cache too and made every shard re-build the entire monorepo
      # (~4 min per shard). With `VITEST_SHARD` in the key the build
      # warm-up from the previous step stays warm and the test step
      # starts immediately.
      - name: Run tests with coverage (shard ${{ matrix.shard }}/4)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          VITEST_SHARD: ${{ matrix.shard }}/4
        # --passWithNoTests is NOT injected from CI here — every package's
        # `test` / `test:coverage` script in its own package.json already
        # includes it. vitest 3.2.4+ rejects duplicated flags with
        # "Expected a single value for option --passWithNoTests", so the
        # CI must only inject what is shard-specific. New packages must
        # carry `--passWithNoTests` in their own script (sensible local
        # default + safety against shards landing on an empty file set).
        # --coverage.thresholds.* are zeroed because per-package vitest
        # thresholds cannot be met by a single shard. The aggregated
        # threshold check is enforced by the coverage-check job below
        # against the merged coverage from all shards.
        run: |
          pnpm turbo run test:coverage --concurrency=4 -- \
            --shard=${{ matrix.shard }}/4 \
            --coverage.thresholds.lines=0 \
            --coverage.thresholds.functions=0 \
            --coverage.thresholds.branches=0 \
            --coverage.thresholds.statements=0
      - name: Run tests without coverage (shard ${{ matrix.shard }}/4)
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        env:
          VITEST_SHARD: ${{ matrix.shard }}/4
        # Cheaper run for PRs and pushes to staging. No coverage artifact
        # produced, so coverage-check is skipped (and accepted by ci-pass).
        # See coverage variant above for why --passWithNoTests is NOT
        # injected here from CI.
        run: |
          pnpm turbo run test --concurrency=4 -- \
            --shard=${{ matrix.shard }}/4
      - name: Upload coverage artifacts (shard ${{ matrix.shard }})
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: |
            apps/*/coverage/coverage-final.json
            packages/*/coverage/coverage-final.json
          if-no-files-found: warn
          retention-days: 7

  # ------------------------------------------------------------------
  # Integration tests requiring a real PostgreSQL instance.
  # Independent of unit tests so a unit failure doesn't hide
  # integration regressions. ~7 min.
  # ------------------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: hospeda_user
          POSTGRES_PASSWORD: hospeda_pass
          POSTGRES_DB: postgres
        ports:
          - 5436:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-outputs
      - name: Run integration tests (SPEC-061 db + SPEC-080 service-core)
        run: pnpm test:integration
        env:
          HOSPEDA_TEST_DATABASE_URL: postgresql://hospeda_user:hospeda_pass@localhost:5436/postgres

  # ------------------------------------------------------------------
  # Coverage threshold check. Downloads the per-shard raw coverage
  # artifacts produced by test-unit, merges them per package using
  # istanbul-lib-coverage, regenerates summaries, and enforces per-
  # package floors. ~1 min.
  # ------------------------------------------------------------------
  coverage-check:
    name: Coverage Threshold
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test-unit
    # Coverage artifacts only exist on main pushes (see test-unit job).
    # On PRs and staging pushes this job is skipped and ci-pass treats
    # the skipped result as acceptable.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Download coverage artifacts (all shards)
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-shard-*
          path: coverage-shards/
      - name: Merge coverage from shards
        run: node scripts/ci/merge-coverage.mjs coverage-shards coverage-merged
      - name: Check coverage threshold
        env:
          COVERAGE_DIR: coverage-merged
        run: |
          echo "📊 Checking coverage threshold..."

          COVERAGE_FILES=$(find "$COVERAGE_DIR" -name 'coverage-summary.json' 2>/dev/null)

          if [ -z "$COVERAGE_FILES" ]; then
            echo "❌ No coverage files found"
            exit 1
          fi

          FAILED=0
          TOTAL_COVERAGE=0
          FILE_COUNT=0

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Coverage Report by Package"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          for file in $COVERAGE_FILES; do
            # Path layout: coverage-artifacts/<workspace-relative-path>/coverage/coverage-summary.json
            PACKAGE_PATH=$(dirname $(dirname "$file"))
            PACKAGE_NAME=$(basename "$PACKAGE_PATH")

            COVERAGE=$(jq -r '.total.lines.pct' "$file")
            COVERAGE_ROUNDED=$(printf "%.2f" "$COVERAGE")

            echo ""
            echo "📦 Package: $PACKAGE_NAME"
            echo "   Coverage: $COVERAGE_ROUNDED%"

            # Determine threshold per package. The web, admin, and api
            # apps use lower bars because most surfaces are framework-
            # specific (Astro SSR components, TanStack Router routes,
            # React islands) or integration-shaped tests that mock route
            # handlers via vi.spyOn (v8 cannot follow the indirection).
            # Their behavior is verified through page-level, integration,
            # and E2E tests instead of per-file unit coverage.
            #
            # schemas and service-core thresholds are baselined just
            # below their current real coverage. The previous coverage-
            # check loop was broken (only iterated `db` due to artifact
            # path collisions) so these packages were never actually
            # verified — the sharded merge surfaces real gaps. Bringing
            # both back to 90% requires adding tests; tracked as tech
            # debt, not a regression.
            THRESHOLD=90
            if [ "$PACKAGE_NAME" = "web" ]; then
              THRESHOLD=55
            elif [ "$PACKAGE_NAME" = "admin" ]; then
              THRESHOLD=50
            elif [ "$PACKAGE_NAME" = "api" ]; then
              THRESHOLD=75
            elif [ "$PACKAGE_NAME" = "schemas" ]; then
              THRESHOLD=85
            elif [ "$PACKAGE_NAME" = "service-core" ]; then
              THRESHOLD=88
            fi

            if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
              echo "   ❌ FAIL: Coverage below ${THRESHOLD}% threshold"
              FAILED=1
            else
              echo "   ✅ PASS: Coverage meets ${THRESHOLD}% threshold"
            fi

            TOTAL_COVERAGE=$(echo "$TOTAL_COVERAGE + $COVERAGE" | bc)
            FILE_COUNT=$((FILE_COUNT + 1))
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ $FILE_COUNT -gt 0 ]; then
            GLOBAL_COVERAGE=$(echo "scale=2; $TOTAL_COVERAGE / $FILE_COUNT" | bc)
            echo "🌍 Global Average Coverage: $GLOBAL_COVERAGE%"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""

          if [ $FAILED -eq 1 ]; then
            echo "❌ Coverage check failed: One or more packages below their threshold"
            exit 1
          else
            echo "✅ All packages meet their coverage thresholds"
          fi

  # ------------------------------------------------------------------
  # Aggregator job. Reports a single PASS/FAIL after every CI leaf job
  # completes. Originally also gated a CD workflow (cd-production.yml)
  # that was retired when deploys moved off Vercel to Coolify (VPS) in
  # Phase 16.3 — deploys are now triggered manually via the Coolify UI
  # (or `hops redeploy <app>` from inside the VPS), NOT from this repo's
  # workflows. The aggregator stays because it makes branch-protection
  # rules simpler: one required status check ("CI Pass") instead of
  # nine independent ones.
  # ------------------------------------------------------------------
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - security
      - guards
      - build
      - typecheck
      - test-unit
      - test-integration
      - coverage-check
    steps:
      - name: Aggregate result
        # coverage-check is intentionally skipped on PRs and staging
        # pushes (the threshold gate only applies on main), so accept
        # "skipped" as a passing result for that one job. Every other
        # job must report "success".
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] \
            || [ "${{ needs.security.result }}" != "success" ] \
            || [ "${{ needs.guards.result }}" != "success" ] \
            || [ "${{ needs.build.result }}" != "success" ] \
            || [ "${{ needs.typecheck.result }}" != "success" ] \
            || [ "${{ needs.test-unit.result }}" != "success" ] \
            || [ "${{ needs.test-integration.result }}" != "success" ] \
            || ( [ "${{ needs.coverage-check.result }}" != "success" ] \
                 && [ "${{ needs.coverage-check.result }}" != "skipped" ] ); then
            echo "❌ One or more checks failed"
            exit 1
          fi
          echo "✅ All checks passed"
