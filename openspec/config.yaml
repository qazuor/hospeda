## Phase Rules

### proposal
- Capture intent, scope, and approach. Reference SPEC-NNN when continuing project-native `.qtm/specs/SPEC-NNN-*/`.
- File pattern: `openspec/changes/<change-id>/proposal.md`.

### spec
- Write delta specs in `openspec/changes/<change-id>/specs/<capability>/spec.md` with `## Purpose`, `## Requirements` (WHEN/SHALL), `## Scenarios` (#### Scenario: ...).
- Reuse the project's existing `.qtm/specs/SPEC-NNN-*/spec.md` as the canonical functional spec — only create SDD delta specs when the change adds/modifies/archives capability contracts.

### design
- Produce `openspec/changes/<change-id>/design.md` with: context, goals/non-goals, architecture, components, data model, error model, testing plan.
- For sdd-init on existing project, base on detected stack (above) and CLAUDE.md patterns.

### tasks
- 1–2 day sized tasks. Dependencies explicit. `openspec/changes/<change-id>/tasks.md`.
- Reuse `.qtm/tasks/SPEC-NNN-*/state.json` for project-native task tracking when applicable.

### apply
- Implement from tasks. Run `pnpm typecheck && pnpm lint && pnpm test` before marking done.
- For DB changes: use `pnpm db:generate` + `pnpm db:migrate` + `pnpm db:apply-extras`. NEVER `db:push` against the VPS.
- For new env vars: register in `packages/config/src/env-registry.*.ts`, validate in `apps/*/src/utils/env.ts`, update `.env.example`, set in Coolify, redeploy.
- Bug fixes: regression test FIRST.

### verify
- Run the full gate: `pnpm typecheck && pnpm lint && pnpm test && pnpm test:coverage && pnpm check:guards`.
- Match every `## Requirements` (SHALL) to a passing test or manual evidence.
- Update `openspec/changes/<change-id>` with verification log.

### archive
- Sync delta specs into `openspec/specs/<capability>/spec.md` (use `openspec-convention` reference). Move change folder to `openspec/changes/archive/YYYY-MM-DD-<change-id>/`.
- If touching project-native `.qtm/specs/SPEC-NNN-*/`: update `.qtm/specs/index.json` (status, archived) AND `.qtm/tasks/index.json` (status, progress, archived) in the same change (per CLAUDE.md index sync rules).

