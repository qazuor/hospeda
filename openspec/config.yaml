## Context

Hospeda is a tourist accommodation platform for Concepcion del Uruguay and the Litoral region of Argentina. The project uses an internal QTM task management system at `.qtm/specs/` and `.qtm/tasks/` which is **separate from this SDD `openspec/` directory** — keep both in sync if a change touches project state.

Default locale: `es` (Argentina market). i18n: es/en/pt.

The project enforces a 6-step branch workflow (branch from `staging`, PR to `staging`, soak, then `staging` → `main`). `main` and `staging` are protected by convention. See `CLAUDE.md` for the full policy.

